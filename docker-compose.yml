version: '3.8'

services:
  kafka:
    image: confluentinc/cp-kafka:7.8.3
    container_name: kafka
    ports:
      - "9092:9092"

    environment:
      KAFKA_KRAFT_MODE: 'true'

      CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo'
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    volumes:
      - kafka_kraft:/var/lib/kafka/data
    networks:
      - metanet1

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: ${MB_POSTGRES_PASSWORD}
      MB_DB_HOST: postgres-meta
    networks:
      - metanet1
    depends_on:
      postgres-meta:
        condition: service_healthy

  # --- METADATA DATABASE (For Metabase) ---
  postgres-meta:
    image: postgres:16
    container_name: postgres_metabase
    environment:
      POSTGRES_USER: metabase
      POSTGRES_DB: metabase
      POSTGRES_PASSWORD: ${MB_POSTGRES_PASSWORD}
    volumes:
      - ./pg_meta_data:/var/lib/postgresql/data
    networks:
      - metanet1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- STREAM DATA DATABASE (For Aviation Data) ---
  postgres-stream:
    image: postgres:16
    container_name: postgres_aviation
    environment:
      POSTGRES_USER: aviation_user
      POSTGRES_DB: aviation_db
      POSTGRES_PASSWORD: ${STREAM_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./pg_stream_data:/var/lib/postgresql/data
    networks:
      - metanet1

networks:
  metanet1:
    driver: bridge

volumes:
  kafka_kraft:
